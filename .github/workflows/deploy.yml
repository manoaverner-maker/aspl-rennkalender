# Baut die Seite bei jedem Push auf main und deployt sie zu GitHub Pages.
# Vorteil: Renntermine koennen direkt in den JSON-Dateien (auch im GitHub-Webeditor)
# gepflegt werden — der Build laeuft automatisch in der Cloud.
name: Deploy zu GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # GitHub Pages meldet direkt nach dem Artifact-Upload oefter
      # "Deployment failed, try again later" — darum ein eingebauter Retry
      - id: versuch1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.versuch1.outcome == 'failure'
        run: sleep 30
      - id: deployment
        if: steps.versuch1.outcome == 'failure'
        uses: actions/deploy-pages@v4
