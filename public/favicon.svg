<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- ASPL Rennkalender Logo: Globus + A-Monogramm mit Speed-Linien -->
  <defs>
    <clipPath id="badge"><rect width="512" height="512" rx="110"/></clipPath>
    <clipPath id="kugel"><circle cx="264" cy="252" r="148"/></clipPath>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e10600"/>
      <stop offset="0.72" stop-color="#e10600"/>
      <stop offset="1" stop-color="#e10600" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#badge)">
    <rect width="512" height="512" fill="#0b0b10"/>
    <!-- Globus -->
    <circle cx="264" cy="252" r="148" fill="#0e1522"/>
    <g clip-path="url(#kugel)" stroke="#33507a" stroke-width="5" fill="none">
      <ellipse cx="264" cy="252" rx="148" ry="148"/>
      <ellipse cx="264" cy="252" rx="96" ry="148"/>
      <ellipse cx="264" cy="252" rx="40" ry="148"/>
      <path d="M116 252h296"/>
      <path d="M132 180h264"/>
      <path d="M132 324h264"/>
    </g>
    <circle cx="264" cy="252" r="148" fill="none" stroke="#456a9c" stroke-width="7"/>
    <!-- A-Monogramm -->
    <path d="M196 372 L264 158 L332 372" fill="none" stroke="#0b0b10" stroke-width="74" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M196 372 L264 158 L332 372" fill="none" stroke="#e10600" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Querstrich mit Speed-Linien -->
    <path d="M226 306 H302" stroke="#0b0b10" stroke-width="58" stroke-linecap="round"/>
    <path d="M170 306 H302" stroke="#e10600" stroke-width="32" stroke-linecap="round"/>
    <path d="M118 306 H142" stroke="#e10600" stroke-width="32" stroke-linecap="round" opacity="0.66"/>
    <path d="M74 306 H90" stroke="#e10600" stroke-width="32" stroke-linecap="round" opacity="0.35"/>
    <!-- Naechstes-Rennen-Marker -->
    <circle cx="376" cy="140" r="34" fill="none" stroke="#00e676" stroke-width="7" opacity="0.45"/>
    <circle cx="376" cy="140" r="19" fill="#00e676" stroke="#0b0b10" stroke-width="6"/>
    <!-- Racing-Streifen unten -->
    <rect x="0" y="448" width="512" height="18" fill="url(#stripe)"/>
    <rect x="0" y="474" width="330" height="10" fill="url(#stripe)" opacity="0.55"/>
  </g>
</svg>
